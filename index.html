<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotogalerie – Újezd u Žďáru nad Sázavou</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      padding: 12px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .album-card {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      background: #fff;
    }

    .album-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .album-card .caption {
      padding: 8px 10px;
      font-size: 12px;
      color: #444;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-wrap {
      text-align: center;
    }

    .btn-gallery {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      gap: .5rem;
      padding: .625rem 1.5rem;
      color: #fff;
      font: inherit;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      border: .0625rem solid rgba(0,0,0,0);
      border-radius: 10px;
      background: #ac1719;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-gallery:hover {
      background: #8e1214;
    }
  </style>
</head>
<body>

  <div class="gallery-grid">
    <div class="album-card">
      <img
        src="https://files.qaro.digiday.cz/site/019df6ef-7f3b-7d25-9c35-90ced9d2807f/uploads/2026/05/14/18846b0b88a82066795ff6d72f869787.jpg"
        alt="Taneční Kurz – leden 2026"
        loading="lazy"
      >
      <div class="caption">Taneční Kurz – leden 2026</div>
    </div>

    <div class="album-card">
      <img
        src="https://files.qaro.digiday.cz/site/019df6ef-7f3b-7d25-9c35-90ced9d2807f/uploads/2026/05/14/83d45131790148836adeaa1b5debaff0.jpg"
        alt="Tříkrálová sbírka 1/2025"
        loading="lazy"
      >
      <div class="caption">Tříkrálová sbírka 1/2025</div>
    </div>

    <div class="album-card">
      <img
        src="https://files.qaro.digiday.cz/site/019df6ef-7f3b-7d25-9c35-90ced9d2807f/uploads/2026/05/14/73ccb9665f8db77d36d31b7951287b03.jpg"
        alt="Leden 2024 – 3 králové"
        loading="lazy"
      >
      <div class="caption">Leden 2024 – 3 králové</div>
    </div>
  </div>

  <div class="btn-wrap">
    <a
      href="https://ujezduzdaru.digiday.cz/fotogalerie"
      target="_blank"
      rel="noopener"
      class="btn-gallery"
    >Zobrazit celou galerii</a>
  </div>

</body>
</html>
